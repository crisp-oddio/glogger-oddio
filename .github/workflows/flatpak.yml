name: Flatpak

on:
  # Run when a release tag is pushed
  push:
    tags:
      - 'v*'
  # Or trigger manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-latest
    # The flatpak-builder action needs flatpak-builder + the GNOME SDK, which only
    # exist inside the official Flatpak builder image (not on the bare runner).
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Generate offline source manifests ───────────────────────────────
      # Flatpak build environments have no internet access, so we must
      # pre-fetch all Cargo and npm dependencies into source lists that
      # flatpak-builder can cache-populate before the build runs.

      # The cargo generator is still a standalone script (needs aiohttp + tomlkit).
      # The node generator has moved into a Python package upstream — the old
      # single-file URL now 404s — so install it from the git subdirectory, which
      # also handles newer nested node_modules layouts (e.g. Tailwind's oxide-wasi).
      # Use a venv so pip works regardless of the container's PEP 668 policy.
      - name: Install offline-source generators
        run: |
          python3 -m venv /tmp/gen
          /tmp/gen/bin/pip install --quiet aiohttp tomlkit \
            "git+https://github.com/flatpak/flatpak-builder-tools.git#subdirectory=node"

      - name: Download flatpak-cargo-generator
        run: |
          curl -sSL -o /tmp/flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py

      - name: Generate Cargo offline sources
        run: |
          /tmp/gen/bin/python /tmp/flatpak-cargo-generator.py \
            src-tauri/Cargo.lock \
            -o flatpak/generated-cargo-sources.json

      - name: Generate npm offline sources
        run: |
          /tmp/gen/bin/flatpak-node-generator npm package-lock.json \
            -o flatpak/generated-node-sources.json

      # ── Build Flatpak ───────────────────────────────────────────────────

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: glogger.flatpak
          manifest-path: flatpak/io.github.crisp_oddio.glogger.yml
          cache: true
          cache-key: flatpak-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}

      # ── Upload artifact / attach to release ────────────────────────────

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: glogger-flatpak
          path: glogger.flatpak

  # Attaching runs on a bare runner because the builder container has no gh CLI.
  attach:
    name: Attach bundle to release
    needs: flatpak
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download built bundle
        uses: actions/download-artifact@v4
        with:
          name: glogger-flatpak

      - name: Attach bundle to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" glogger.flatpak \
            --repo "${{ github.repository }}" \
            --clobber
