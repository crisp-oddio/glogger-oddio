name: Flatpak

on:
  # Run when a release tag is pushed *manually* (a tag pushed by the Release
  # workflow's GITHUB_TOKEN will NOT fire this — see workflow_call below).
  push:
    tags:
      - 'v*'
  # Trigger manually from the Actions tab against an existing release tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build & attach the Flatpak to (e.g. v0.9.11)"
        required: true
        type: string
  # Called by the Release workflow so every release gets a Flatpak. A tag pushed
  # by the release run's GITHUB_TOKEN can't trigger the `push` event above
  # (GitHub's anti-recursion rule), so the Release workflow invokes this directly.
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build & attach the Flatpak to"
        required: true
        type: string

permissions:
  contents: write

# Target tag resolved from whichever trigger fired:
#   push           → github.ref_name (the pushed tag)
#   dispatch/call  → inputs.tag
env:
  TARGET_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-latest
    # The flatpak-builder action needs flatpak-builder + the GNOME SDK, which only
    # exist inside the official Flatpak builder image (not on the bare runner).
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.TARGET_TAG }}

      # ── Generate offline source manifests ───────────────────────────────
      # Flatpak build environments have no internet access, so we must
      # pre-fetch all Cargo and npm dependencies into source lists that
      # flatpak-builder can cache-populate before the build runs.

      # The cargo generator is still a standalone script (needs aiohttp + tomlkit).
      # The node generator has moved into a Python package upstream — the old
      # single-file URL now 404s — so install it from the git subdirectory, which
      # also handles newer nested node_modules layouts (e.g. Tailwind's oxide-wasi).
      # Use a venv so pip works regardless of the container's PEP 668 policy.
      - name: Install offline-source generators
        run: |
          python3 -m venv /tmp/gen
          /tmp/gen/bin/pip install --quiet aiohttp tomlkit \
            "git+https://github.com/flatpak/flatpak-builder-tools.git#subdirectory=node"

      - name: Download flatpak-cargo-generator
        run: |
          curl -sSL -o /tmp/flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py

      - name: Generate Cargo offline sources
        run: |
          /tmp/gen/bin/python /tmp/flatpak-cargo-generator.py \
            src-tauri/Cargo.lock \
            -o flatpak/generated-cargo-sources.json

      - name: Generate npm offline sources
        run: |
          /tmp/gen/bin/flatpak-node-generator npm package-lock.json \
            -o flatpak/generated-node-sources.json

      # ── Build Flatpak ───────────────────────────────────────────────────

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: glogger.flatpak
          manifest-path: flatpak/io.github.crisp_oddio.glogger.yml
          cache: true
          cache-key: flatpak-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}

      # ── Upload artifact / attach to release ────────────────────────────

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: glogger-flatpak
          path: glogger.flatpak

  # Attaching runs on a bare runner because the builder container has no gh CLI.
  attach:
    name: Attach bundle to release
    needs: flatpak
    runs-on: ubuntu-latest
    # Run whenever we have a target tag: a manually-pushed tag (push), an explicit
    # dispatch input, or a workflow_call from the Release workflow.
    if: ${{ inputs.tag != '' || startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Download built bundle
        uses: actions/download-artifact@v8
        with:
          name: glogger-flatpak

      - name: Attach bundle to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${TARGET_TAG}"
          # The Release workflow pushes the tag in its prepare job but only creates the
          # GitHub Release after its multi-platform build finishes (~15-20 min), well after
          # this Flatpak job (~9.5 min). Wait for the release to exist before uploading.
          echo "Waiting for release $TAG to be created..."
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              echo "Release $TAG found."
              break
            fi
            echo "  attempt $i/30 — not yet, retrying in 60s"
            sleep 60
          done
          gh release upload "$TAG" glogger.flatpak \
            --repo "${{ github.repository }}" \
            --clobber
