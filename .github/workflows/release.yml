name: Release

# Phase 1 of the release: validate, bump the version on a `release/vX` branch,
# and open a PR for review. Merging that PR to `main` is what publishes the
# release — see release-publish.yml, which builds + publishes once the bump
# lands on `main`.
#
# This two-phase split exists because `main` is protected (PRs required), so
# the release bot cannot push the version-bump commit directly. The bump goes
# through a normal PR you approve + merge.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type or explicit version (patch, minor, major, or x.y.z)"
        required: true
        default: "patch"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Step 0: validate the project builds and tests pass ──
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend type-check and build
        run: npm run build

      - name: Rust check and tests
        working-directory: src-tauri
        run: |
          cargo check
          cargo test

  # ── Step 1: bump version + changelog on a branch, open the release PR ──
  open-release-pr:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version
        id: version
        shell: bash
        run: |
          chmod +x scripts/bump-version.sh
          scripts/bump-version.sh "${{ github.event.inputs.version }}"
          NEW_VERSION=$(sed -n 's/.*"version"\s*:\s*"\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        shell: bash
        run: |
          chmod +x scripts/generate-changelog.sh
          scripts/generate-changelog.sh > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create release branch and open PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Recreate the branch from the current main so re-runs are idempotent.
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "release: v${VERSION}"
          git push --force origin "$BRANCH"

          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR already open for $BRANCH — branch updated."
          else
            BODY=$(printf 'Automated version bump to **v%s**.\n\nApprove and merge this PR to publish the release. Once it lands on `main`, the **Release Publish** workflow tags `v%s` and builds the Windows / macOS / Linux installers + GitHub Release automatically, then attaches the Flatpak.\n\n---\n\n%s\n' "$VERSION" "$VERSION" "$(cat RELEASE_NOTES.md)")
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "release: v${VERSION}" \
              --body "$BODY"
          fi

          echo "Opened release PR for v${VERSION}. Approve + merge it to publish."
