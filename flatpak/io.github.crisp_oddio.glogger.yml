app-id: io.github.crisp_oddio.glogger
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22
command: glogger

finish-args:
  # Display / GPU
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Network (CDN data fetches, update checks)
  - --share=network
  # Read game log files wherever the game is installed (Wine, Steam, Lutris, etc.)
  - --filesystem=home:ro
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  prepend-ld-library-path: /usr/lib/sdk/rust-stable/lib
  env:
    CARGO_HOME: /run/build/glogger/cargo
    # Disable LTO to avoid linker memory spikes on the Actions runner
    CARGO_PROFILE_RELEASE_LTO: "off"
    npm_config_cache: /run/build/glogger/npm-cache
    # Use the release identifier so app data goes to glogger.Release, not glogger.Dev
    TAURI_CONFIG: '{"identifier":"glogger.Release","app":{"windows":[{"title":"glogger (oddio fork)"}]}}'

modules:
  - name: glogger
    buildsystem: simple
    build-commands:
      # 1. Build the Vue frontend (outputs to dist/)
      - npm ci --offline
      - npm run build

      # 2. Build the Tauri/Rust binary (offline — cargo sources pre-fetched below)
      - cargo build --release --offline --manifest-path src-tauri/Cargo.toml

      # 3. Install binary
      - install -Dm755 src-tauri/target/release/glogger /app/bin/glogger

      # 4. Desktop integration
      - install -Dm644 flatpak/io.github.crisp_oddio.glogger.desktop
          /app/share/applications/io.github.crisp_oddio.glogger.desktop
      - install -Dm644 src-tauri/icons/32x32.png
          /app/share/icons/hicolor/32x32/apps/io.github.crisp_oddio.glogger.png
      - install -Dm644 src-tauri/icons/128x128.png
          /app/share/icons/hicolor/128x128/apps/io.github.crisp_oddio.glogger.png
      - install -Dm644 src-tauri/icons/icon.png
          /app/share/icons/hicolor/256x256/apps/io.github.crisp_oddio.glogger.png

    sources:
      # The repo root (parent of this manifest's directory)
      - type: dir
        path: ..
      # Offline Cargo registry — generated by flatpak-cargo-generator in CI
      - generated-cargo-sources.json
      # Offline npm cache — generated by flatpak-node-generator in CI
      - generated-node-sources.json
